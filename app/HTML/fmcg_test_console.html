<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FMCG Backend Tester</title>
<style>
  :root{
    --bg:#1e1e1e; --panel:#262626; --border:#3a3a3a; --text:#ddd;
    --muted:#888; --accent:#5b9dd9; --ok:#4caf50; --err:#e05050; --mono:'Consolas','Menlo',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;}
  header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  header h1{font-size:15px;margin:0;font-weight:bold;}
  header input[type=text]{background:#111;border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:var(--mono);width:230px;}
  header label{color:var(--muted);font-size:12px;}
  #jwtStatus{font-size:11px;padding:2px 6px;border:1px solid var(--border);color:var(--muted);}

  .layout{display:flex;height:calc(100vh - 46px);}
  nav{width:190px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;}
  nav .sys-btn{display:block;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--border);color:var(--text);padding:8px 10px;cursor:pointer;font-family:var(--mono);font-size:12px;}
  nav .sys-btn:hover{background:#2f2f2f;}
  nav .sys-btn.active{background:var(--accent);color:#111;font-weight:bold;}

  main{flex:1;overflow-y:auto;padding:14px 18px;}
  .sys-block{display:none;}
  .sys-block.active{display:block;}
  .sys-title{font-size:14px;font-weight:bold;color:var(--accent);margin-bottom:2px;}
  .sys-sub{color:var(--muted);font-size:11px;margin-bottom:12px;}

  .ep{border:1px solid var(--border);background:var(--panel);margin-bottom:10px;}
  .ep-head{padding:7px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .method{padding:1px 6px;font-size:11px;font-weight:bold;border-radius:2px;}
  .method.GET{background:#1f3a52;color:#7ec3ff;}
  .method.POST{background:#3a2f1f;color:#ffb35c;}
  .path{font-size:12px;}
  .ep-desc{color:var(--muted);font-size:11px;margin-left:auto;}
  .ep-body{padding:10px;display:flex;gap:14px;flex-wrap:wrap;}

  .ep-inputs{flex:1;min-width:260px;display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;align-content:start;}
  .field{display:flex;flex-direction:column;}
  .field.full{grid-column:1 / -1;}
  .field label{color:var(--muted);font-size:10.5px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em;}
  .field .hint{color:#5a5a5a;font-size:10px;margin-top:2px;}
  .ep-inputs input[type=text], .ep-inputs input[type=number], .ep-inputs select{
    background:#111;border:1px solid var(--border);color:var(--text);padding:6px 7px;font-family:var(--mono);font-size:12px;
  }
  .ep-inputs input:focus, .ep-inputs select:focus{outline:1px solid var(--accent);}

  .bool-toggle{display:flex;border:1px solid var(--border);overflow:hidden;}
  .bool-toggle button{flex:1;background:#111;color:var(--muted);border:none;padding:5px 0;font-family:var(--mono);font-size:11px;cursor:pointer;}
  .bool-toggle button.on{background:var(--accent);color:#111;font-weight:bold;}

  .ep-actions{display:flex;flex-direction:column;gap:6px;justify-content:flex-start;}
  button.send{background:var(--accent);color:#111;border:none;padding:6px 14px;font-weight:bold;cursor:pointer;font-family:var(--mono);font-size:12px;white-space:nowrap;}
  button.send:hover{opacity:.85;}
  button.toggleraw{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 10px;cursor:pointer;font-family:var(--mono);font-size:11px;white-space:nowrap;}
  button.toggleraw:hover{color:var(--text);}

  .raw-box{grid-column:1/-1;display:none;}
  .raw-box.show{display:block;}
  .raw-box textarea{width:100%;min-height:70px;background:#111;border:1px solid var(--border);color:var(--text);padding:6px 7px;font-family:var(--mono);font-size:11.5px;resize:vertical;}

  .file-row{display:flex;align-items:center;gap:6px;}
  input[type=file]{font-size:11px;color:var(--muted);width:100%;}

  .resp{flex:1.2;min-width:260px;}
  .resp .status{font-size:11px;margin-bottom:4px;}
  .resp .status.ok{color:var(--ok);}
  .resp .status.err{color:var(--err);}
  .resp pre{background:#111;border:1px solid var(--border);padding:8px;margin:0;max-height:220px;overflow:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#444;}
</style>
</head>
<body>

<header>
  <h1>FMCG Backend Tester</h1>
  <label>Base URL <input type="text" id="baseUrl" value="http://localhost:8080"></label>
  <span id="jwtStatus">Auth cookie handled by browser automatically after /AMS/login</span>
</header>

<div class="layout">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script>
const BASE = () => document.getElementById('baseUrl').value.replace(/\/$/,'');

// ---- field type helpers ----
// field: {key, label, type: 'text'|'number'|'select'|'boolOrFalse', options?, placeholder?, hint?, full?}

function f(key,label,opts={}){ return Object.assign({key,label,type:'text'},opts); }
function fNum(key,label,opts={}){ return Object.assign({key,label,type:'number'},opts); }
function fSelect(key,label,options,opts={}){ return Object.assign({key,label,type:'select',options},opts); }
function fBoolOrFalse(key,label,opts={}){ return Object.assign({key,label,type:'boolOrFalse'},opts); }

const ROLE_OPTS = ['CUS','CSE','SUP'];
const STATUS_OPTS_PRODUCT = ['Active','Deactive','Archived'];
const PRIORITY_OPTS = ['Low','Medium','High','Critical'];

// ---- Endpoint definitions, grouped by system ----
const SYSTEMS = [
  {
    id:'AMS', name:'Authentication (AMS)',
    eps:[
      {m:'POST', p:'/AMS/login', desc:'Login, sets JWT cookie',
        fields:[ f('NAM','Username'), f('PAS','Password',{inputType:'password'}) ]},
      {m:'POST', p:'/AMS/signup', desc:'Register (CSE needs SUP login first)',
        fields:[ f('NAM','Username'), f('PAS','Password',{inputType:'password'}), f('EMA','Email'),
                 fSelect('ROL','Role', ROLE_OPTS) ]},
      {m:'POST', p:'/AMS/{user_name}/Update', desc:'Update account', params:['user_name'],
        fields:[ fBoolOrFalse('EMA','New email (or skip)'),
                 fBoolOrFalse('PAS','New password (or skip)'),
                 fBoolOrFalse('ROL','Promote to SUP? (SUP caller only)') ]},
      {m:'POST', p:'/AMS/logout', desc:'Logout current user'}
    ]
  },
  {
    id:'PMS', name:'Product Mgmt (PMS)',
    eps:[
      {m:'POST', p:'/PMS/Create', desc:'Create product (SUP only)',
        fields:[ f('PNM','Product name'), f('PCAT','Category'), f('PDES','Description',{full:true}),
                 fSelect('PSTA','Status', STATUS_OPTS_PRODUCT) ]},
      {m:'POST', p:'/PMS/{PID}/Delete', desc:'Delete product', params:['PID']},
      {m:'POST', p:'/PMS/{PID}/Update', desc:'Update product', params:['PID'],
        fields:[ fBoolOrFalse('PSTA','New status (or skip)', {selectWhenOn:STATUS_OPTS_PRODUCT}),
                 fBoolOrFalse('PDES','New description (or skip)') ]},
      {m:'POST', p:'/PMS/Get_ALL', desc:'List products in range',
        fields:[ fNum('i','Start index',{placeholder:'0'}), fNum('j','Stop index',{placeholder:'10'}) ]},
      {m:'GET', p:'/PMS/{Product_ID}/Get', desc:'Get product by ID', params:['Product_ID']}
    ]
  },
  {
    id:'PKMS', name:'Product Knowledge (PKMS)',
    eps:[
      {m:'POST', p:'/PKMS/upload_document', desc:'Upload doc (multipart: Ufile + metaData)', file:true,
        fields:[ f('DID','Document ID'), f('DNM','Document name'),
                 f('DTYPE','Doc type path',{placeholder:'cat1/subcat2/',hint:'must end with trailing /'}) ]},
      {m:'GET', p:'/PKMS/all_documents', desc:'List all documents'},
      {m:'POST', p:'/PKMS/{Document_ID}/Delete', desc:'Delete a document', params:['Document_ID']}
    ]
  },
  {
    id:'CMS', name:'Complaint Mgmt (CMS)',
    eps:[
      {m:'POST', p:'/CMS/Create', desc:'Create complaint',
        fields:[ f('CUS','Customer name'), f('PID','Product ID'), f('CDES','Description',{full:true}) ]},
      {m:'POST', p:'/CMS/return_all', desc:'List complaints in range',
        fields:[ fNum('i','Start index',{placeholder:'0'}), fNum('j','Stop index',{placeholder:'10'}) ]},
      {m:'GET', p:'/CMS/{Complaint_ID}', desc:'Get complaint by ID', params:['Complaint_ID']},
      {m:'POST', p:'/CMS/{Complaint_ID}/Update', desc:'Update complaint', params:['Complaint_ID'],
        fields:[ f('CDES','New description',{full:true}), f('CST','New status') ]}
    ]
  },
  {
    id:'RRS', name:'RAG Retrieval (RRS)',
    eps:[
      {m:'POST', p:'/RRS/retrieve', desc:'Vector search (internal)',
        fields:[ f('query','Query text',{full:true,placeholder:'Leaking shampoo bottle complaint'}) ]}
    ]
  },
  {
    id:'CTAS', name:'Complaint Triage Agent (CTAS)',
    eps:[
      {m:'POST', p:'/CTAS/analyze', desc:'Analyze complaint via AI',
        fields:[ f('CID','Complaint ID') ]}
    ]
  },
  {
    id:'TGS', name:'Ticket Generation (TGS)',
    eps:[
      {m:'POST', p:'/TGS/create_ticket', desc:'Create ticket',
        fields:[ f('CID','Complaint ID'), fSelect('PRI','Priority', PRIORITY_OPTS),
                 f('DEP','Department'), f('DES','Ticket description',{full:true}) ]},
      {m:'POST', p:'/TGS/{Ticket_ID}/Update', desc:'Update ticket status', params:['Ticket_ID'],
        fields:[ f('STA','New status') ]},
      {m:'POST', p:'/TGS/{Ticket_ID}/Escalate', desc:'Escalate ticket', params:['Ticket_ID']},
      {m:'POST', p:'/TGS/{Ticket_ID}/Close', desc:'Close ticket', params:['Ticket_ID']},
      {m:'POST', p:'/TGS/return_all', desc:'List tickets in range',
        fields:[ fNum('i','Start index',{placeholder:'0'}), fNum('j','Stop index',{placeholder:'10'}) ]},
      {m:'GET', p:'/TGS/{Ticket_ID}/return', desc:'Get ticket by ID', params:['Ticket_ID']}
    ]
  },
  {
    id:'DAS', name:'Dashboard Analytics (DAS)',
    eps:[
      {m:'GET', p:'/DAS/overview', desc:'Complaint stats overview'},
      {m:'GET', p:'/DAS/agent_steps', desc:'Agent workflow steps'}
    ]
  },
  {
    id:'URSS', name:'User Resource Serving (URSS)',
    eps:[
      {m:'POST', p:'/URSS/Complain/return_all', desc:'Get my complaints in range (-1,-1 = all)',
        fields:[ fNum('i','Start index',{placeholder:'-1'}), fNum('j','Stop index',{placeholder:'-1'}) ]},
      {m:'GET', p:'/URSS/Complain/latest', desc:'Get my latest complaint'},
      {m:'GET', p:'/URSS/Complain_Progress/{Complain_ID}', desc:'Get ticket progress for a complaint', params:['Complain_ID']}
    ]
  },
  {
    id:'STAT', name:'Statistics',
    eps:[
      {m:'GET', p:'/STAT', desc:'Global stats summary'}
    ]
  }
];

const nav = document.getElementById('nav');
const main = document.getElementById('main');

SYSTEMS.forEach((sys, idx) => {
  const btn = document.createElement('button');
  btn.className = 'sys-btn' + (idx===0 ? ' active':'');
  btn.textContent = sys.name;
  btn.onclick = () => switchSys(sys.id);
  btn.id = 'navbtn-'+sys.id;
  nav.appendChild(btn);

  const block = document.createElement('div');
  block.className = 'sys-block' + (idx===0 ? ' active':'');
  block.id = 'sysblock-'+sys.id;

  const title = document.createElement('div');
  title.className = 'sys-title';
  title.textContent = sys.name;
  block.appendChild(title);

  const sub = document.createElement('div');
  sub.className = 'sys-sub';
  sub.textContent = sys.eps.length + ' endpoint(s)';
  block.appendChild(sub);

  sys.eps.forEach((ep, epi) => {
    block.appendChild(buildEpCard(sys.id, ep, epi));
  });

  main.appendChild(block);
});

function switchSys(id){
  document.querySelectorAll('.sys-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.sys-block').forEach(b=>b.classList.remove('active'));
  document.getElementById('navbtn-'+id).classList.add('active');
  document.getElementById('sysblock-'+id).classList.add('active');
}

function buildField(uid, field){
  const wrap = document.createElement('div');
  wrap.className = 'field' + (field.full ? ' full' : '');

  const lbl = document.createElement('label');
  lbl.textContent = field.label + (field.key ? ' (' + field.key + ')' : '');
  wrap.appendChild(lbl);

  const fid = uid + '_f_' + field.key;

  if (field.type === 'select'){
    const sel = document.createElement('select');
    sel.id = fid;
    field.options.forEach(o=>{
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      sel.appendChild(opt);
    });
    wrap.appendChild(sel);
  } else if (field.type === 'number'){
    const inp = document.createElement('input');
    inp.type = 'number'; inp.id = fid;
    if (field.placeholder) inp.placeholder = field.placeholder;
    wrap.appendChild(inp);
  } else if (field.type === 'boolOrFalse'){
    // toggle: Skip (-> false) / Set (-> shows text or select input)
    const toggle = document.createElement('div');
    toggle.className = 'bool-toggle';
    const skipBtn = document.createElement('button'); skipBtn.type='button'; skipBtn.textContent='Skip';
    const setBtn = document.createElement('button'); setBtn.type='button'; setBtn.textContent='Set';
    toggle.appendChild(skipBtn); toggle.appendChild(setBtn);
    wrap.appendChild(toggle);

    let valueInput;
    if (field.selectWhenOn){
      valueInput = document.createElement('select');
      field.selectWhenOn.forEach(o=>{
        const opt = document.createElement('option'); opt.value=o; opt.textContent=o;
        valueInput.appendChild(opt);
      });
    } else {
      valueInput = document.createElement('input');
      valueInput.type = 'text';
    }
    valueInput.id = fid + '_val';
    valueInput.style.marginTop = '6px';
    valueInput.style.display = 'none';
    wrap.appendChild(valueInput);

    const state = {on:false};
    skipBtn.classList.add('on');
    skipBtn.onclick = ()=>{ state.on=false; skipBtn.classList.add('on'); setBtn.classList.remove('on'); valueInput.style.display='none'; };
    setBtn.onclick = ()=>{ state.on=true; setBtn.classList.add('on'); skipBtn.classList.remove('on'); valueInput.style.display='block'; valueInput.focus(); };
    wrap.dataset.boolState = fid; // marker, state read via skipBtn class at send time
  } else {
    const inp = document.createElement('input');
    inp.type = field.inputType || 'text';
    inp.id = fid;
    if (field.placeholder) inp.placeholder = field.placeholder;
    wrap.appendChild(inp);
  }

  if (field.hint){
    const h = document.createElement('div');
    h.className = 'hint';
    h.textContent = field.hint;
    wrap.appendChild(h);
  }

  return wrap;
}

function buildEpCard(sysId, ep, epi){
  const uid = sysId+'_'+epi;
  const card = document.createElement('div');
  card.className = 'ep';

  const head = document.createElement('div');
  head.className = 'ep-head';
  head.innerHTML = `<span class="method ${ep.m}">${ep.m}</span><span class="path">${ep.p}</span><span class="ep-desc">${ep.desc||''}</span>`;
  card.appendChild(head);

  const body = document.createElement('div');
  body.className = 'ep-body';

  // Inputs column (grid of fields)
  const inputsCol = document.createElement('div');
  inputsCol.className = 'ep-inputs';

  if (ep.params){
    ep.params.forEach(p=>{
      inputsCol.appendChild(buildField(uid, {key:'__param_'+p, label:'Path param: '+p, type:'text', full:false}));
    });
  }

  if (ep.file){
    const wrap = document.createElement('div');
    wrap.className = 'field';
    const lbl = document.createElement('label');
    lbl.textContent = 'File (Ufile)';
    wrap.appendChild(lbl);
    const row = document.createElement('div');
    row.className = 'file-row';
    const finp = document.createElement('input');
    finp.type='file';
    finp.id = uid+'_file';
    row.appendChild(finp);
    wrap.appendChild(row);
    inputsCol.appendChild(wrap);
  }

  if (ep.fields){
    ep.fields.forEach(field=> inputsCol.appendChild(buildField(uid, field)));
  }

  // Raw JSON fallback box (collapsed by default)
  let rawBox = null;
  if (ep.fields){
    rawBox = document.createElement('div');
    rawBox.className = 'raw-box';
    const lbl = document.createElement('label');
    lbl.textContent = 'Raw JSON override (optional — leave blank to use fields above)';
    lbl.style.color = 'var(--muted)'; lbl.style.fontSize='10.5px'; lbl.style.display='block'; lbl.style.marginBottom='3px';
    rawBox.appendChild(lbl);
    const ta = document.createElement('textarea');
    ta.id = uid + '_raw';
    ta.placeholder = '{ "key": "value" }  — if filled, this replaces the fields above';
    rawBox.appendChild(ta);
    inputsCol.appendChild(rawBox);
  }

  body.appendChild(inputsCol);

  // Actions column
  const actCol = document.createElement('div');
  actCol.className = 'ep-actions';
  const sendBtn = document.createElement('button');
  sendBtn.className = 'send';
  sendBtn.textContent = 'Send';
  sendBtn.onclick = () => sendRequest(uid, ep);
  actCol.appendChild(sendBtn);

  if (rawBox){
    const toggleBtn = document.createElement('button');
    toggleBtn.className = 'toggleraw';
    toggleBtn.type = 'button';
    toggleBtn.textContent = 'Raw JSON';
    toggleBtn.onclick = () => rawBox.classList.toggle('show');
    actCol.appendChild(toggleBtn);
  }

  body.appendChild(actCol);

  // Response column
  const respCol = document.createElement('div');
  respCol.className = 'resp';
  respCol.innerHTML = `<div class="status" id="${uid}_status">not sent</div><pre id="${uid}_out">—</pre>`;
  body.appendChild(respCol);

  card.appendChild(body);
  return card;
}

function readBoolOrFalse(fid){
  const valInput = document.getElementById(fid+'_val');
  if (!valInput) return false;
  const shown = valInput.style.display !== 'none';
  if (!shown) return false;
  return valInput.value;
}

function buildBodyFromFields(uid, ep){
  // raw override wins if non-empty
  const rawEl = document.getElementById(uid+'_raw');
  if (rawEl && rawEl.value.trim()){
    return JSON.parse(rawEl.value); // let caller catch
  }
  const obj = {};
  ep.fields.forEach(field=>{
    const fid = uid+'_f_'+field.key;
    if (field.type === 'number'){
      const el = document.getElementById(fid);
      const v = el.value;
      obj[field.key] = v === '' ? (field.placeholder ? Number(field.placeholder) : 0) : Number(v);
    } else if (field.type === 'boolOrFalse'){
      obj[field.key] = readBoolOrFalse(fid);
    } else if (field.type === 'select'){
      obj[field.key] = document.getElementById(fid).value;
    } else {
      obj[field.key] = document.getElementById(fid).value;
    }
  });
  return obj;
}

async function sendRequest(uid, ep){
  let path = ep.p;
  if (ep.params){
    ep.params.forEach(p=>{
      const el = document.getElementById(uid+'_f___param_'+p);
      const val = el ? el.value : '';
      path = path.replace('{'+p+'}', encodeURIComponent(val));
    });
  }
  const url = BASE() + path;
  const statusEl = document.getElementById(uid+'_status');
  const outEl = document.getElementById(uid+'_out');
  statusEl.className = 'status';
  statusEl.textContent = 'sending...';
  outEl.textContent = '—';

  const opts = { method: ep.m, credentials: 'include' };

  try{
    if (ep.file){
      const fileInput = document.getElementById(uid+'_file');
      const fd = new FormData();
      if (fileInput.files[0]) fd.append('Ufile', fileInput.files[0]);
      let meta;
      try{ meta = buildBodyFromFields(uid, ep); }
      catch(e){
        statusEl.className='status err'; statusEl.textContent='invalid raw JSON'; outEl.textContent = e.message; return;
      }
      fd.append('metaData', JSON.stringify(meta));
      opts.body = fd;
    } else if (ep.fields && ep.fields.length){
      let bodyObj;
      try{ bodyObj = buildBodyFromFields(uid, ep); }
      catch(e){
        statusEl.className='status err'; statusEl.textContent='invalid raw JSON'; outEl.textContent = e.message; return;
      }
      opts.headers = {'Content-Type':'application/json'};
      opts.body = JSON.stringify(bodyObj);
    }

    const res = await fetch(url, opts);
    const okClass = res.ok ? 'ok' : 'err';
    statusEl.className = 'status ' + okClass;
    statusEl.textContent = res.status + ' ' + res.statusText;

    const ct = res.headers.get('content-type') || '';
    let text;
    if (ct.includes('application/json')){
      const json = await res.json();
      text = JSON.stringify(json, null, 2);
    } else {
      text = await res.text();
    }
    outEl.textContent = text || '(empty body)';
  } catch(err){
    statusEl.className = 'status err';
    statusEl.textContent = 'request failed';
    outEl.textContent = String(err) + '\n\nLikely CORS or the server is unreachable at ' + url;
  }
}
</script>
</body>
</html>
